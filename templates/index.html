<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<h2>Sehir Hava Durumu</h2>

<input type="text" id="cityInput" placeholder="Sehir gir">
<button onclick="getWeather()">Sorgula</button>

<p id="result"></p>

<script>
function getWeather() {
    const city = document.getElementById("cityInput").value;

    fetch(`/weather?city=${city}`)
        .then(response => response.json())
        .then(data => {
            const result = document.getElementById("result");

            if (data.error) {
                result.innerText = data.error;
                result.className = "error";  // kırmızı yap
            } else {
                result.className = ""; // normal yazı
                result.innerText =
                    `${data.city} | Sicaklik: ${data.temperature}°C | Ruzgar: ${data.wind_speed} | Ucus: ${data.flight_status}`;
            }
        });
}

// ENTER ile çalışsın
document.getElementById("cityInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        getWeather();
    }
});

// Sayfa açılınca İstanbul gelsin
window.onload = function() {
    document.getElementById("cityInput").value = "Istanbul";
    getWeather();
};
</script>

</body>
</html>
